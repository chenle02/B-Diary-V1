<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Diary V1</title><link rel="stylesheet" href="style.css"></head><body><div class="app"><h1>📓 B-Diary V1</h1><div class="sub">Private local diary</div><div id="lock" class="box"></div><div id="main" style="display:none"><div class="box"><input id="date" type="date"><select id="mood"><option>😀 Happy</option><option>🙂 Good</option><option>😐 Normal</option><option>😔 Sad</option><option>😡 Angry</option><option>🤒 Sick</option><option>⭐ Special</option></select><input id="title" placeholder="Title"><textarea id="body" placeholder="Write your diary..."></textarea><button class="blue" onclick="saveEntry()">Save</button><button class="red" onclick="deleteEntry()">Delete</button><button onclick="copyEntry()">Copy</button></div><div class="box"><input id="search" placeholder="Search diary" oninput="renderList()"><div id="list"></div></div></div><div class="bar"><button onclick="openLauncher()">B-Launcher</button><button onclick="openNotes()">B-Notes</button><button onclick="openTasks()">B-Tasks</button><button onclick="lockNow()">Lock</button></div></div><script src="app.js"></script></body></html>
